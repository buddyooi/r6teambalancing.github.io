<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R6 Gathering Hub Match Balancer Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .wrapper {
            max-width: 1100px;
            margin: 0 auto;
        }
        
        /* Updated Header Container for Layout alignment */
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
        }
        @media (min-width: 650px) {
            .header-container {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        
        .header-container h1 {
            margin: 0;
            text-align: center;
            line-height: 1.25;
        }
        @media (min-width: 650px) {
            .header-container h1 {
                text-align: left;
            }
        }

        /* Responsive Branding & Text Resizing */
        .title-brand {
            font-size: 30px;
            font-weight: 700;
            color: #fca311;
            /* text-transform: uppercase; */
            letter-spacing: 0.5px;
            display: block;
        }
        .title-sub {
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            display: block;
            margin-top: 2px;
        }

        /* Discord Button Styling */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: #5865F2;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.25);
            white-space: nowrap;
        }
        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }
        .discord-btn:active {
            transform: translateY(0);
        }
        .discord-icon {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .card {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #ccc;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .player-input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background-color: #fca311;
            color: #000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #e59400;
        }
        #statusLog {
            background-color: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
            color: #a0a0a0;
            white-space: pre-wrap;
        }

        /* API Usage Indicator Card */
        #usageContainer {
            display: none;
            margin-top: 10px;
            font-size: 13px;
            color: #bbb;
            background-color: #121212;
            padding: 10px 12px;
            border-radius: 4px;
            border: 1px dashed #444;
        }

        .team-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
        }
        .blue-team {
            background-color: rgba(33, 150, 243, 0.08);
            border-left: 5px solid #2196F3;
        }
        .orange-team {
            background-color: rgba(255, 152, 0, 0.08);
            border-left: 5px solid #ff9800;
        }
        .team-title {
            margin-top: 0;
            font-size: 20px;
            font-weight: bold;
        }
        .blue-title { color: #2196F3; }
        .orange-title { color: #ff9800; }
        
        ul, ol {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        
        /* Flex Alignment wrapper for Player + Custom Number */
        .player-name-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .num-blue {
            font-weight: bold;
            color: #2196F3; /* Custom Blue Numbers */
            min-width: 18px;
        }
        .num-orange {
            font-weight: bold;
            color: #ff9800; /* Custom Orange Numbers */
            min-width: 18px;
        }
        
        .total-rp {
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
        }
        .result-summary {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 25px;
            color: #4CAF50;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header class="header-container">
        <h1>
            <span class="title-brand">R6 Gathering Hub's</span>
            <span class="title-sub">Match Balancer Tool</span>
        </h1>
        <a href="https://discord.gg/MtsgJU6HYv" target="_blank" class="discord-btn" title="Join our Discord Server">
            <svg class="discord-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.43-5c.86-.63,1.69-1.3,2.49-2a75.41,75.41,0,0,0,72.93,0c.8,1.35,1.63,2,2.49,2a68.43,68.43,0,0,1-10.43,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129,54.65,122.58,31.58,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
            </svg>
            Join Discord
        </a>
    </header>
    
    <div class="grid">
        <div class="card">
            <div class="form-group">
                <label for="base64Key">Base64 Encoded API Key</label>
                <input type="password" id="base64Key" placeholder="Paste your base64 encoded API key here">
                
                <div id="usageContainer">
                    📊 <strong>API Key Usage:</strong> <span id="usageCalls" style="color: #fca311; font-weight: bold;">0</span> / <span id="usageLimit" style="font-weight: bold;">0</span> calls
                </div>
            </div>
            
            <label>Ubisoft IDs (Minimum 2, Maximum 10)</label>
            <div class="player-input-grid" id="playerInputsContainer">
            </div>
            
            <button id="balanceBtn" onclick="processAndBalance()">Fetch Stats & Balance Teams</button>
            
            <div id="statusLog">System Idle. Awaiting entry...</div>
        </div>
        
        <div class="card">
            <h3>Matchup Matrix</h3>
            <hr style="border-color: #333;">
            
            <div id="blueTeamBox" class="team-box blue-team" style="display:none;">
                <div class="team-title blue-title">🔵 Team Blue</div>
                <ol id="blueTeamList"></ol>
                <div class="total-rp" id="blueTotal">Total RP: 0</div>
            </div>
            
            <div id="orangeTeamBox" class="team-box orange-team" style="display:none;">
                <div class="team-title orange-title">🟠 Team Orange</div>
                <ol id="orangeTeamList"></ol>
                <div class="total-rp" id="orangeTotal">Total RP: 0</div>
            </div>
            
            <div class="result-summary" id="finalDiff" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    // Constants matching the configuration parameters
    const PROXY_BASE_URL = `https://still-violet-64d5.andrew10419.workers.dev`;

    const DEFAULT_RP = 1500;
    const BASE_DELAY = 2500;

    // Dynamically generate the 10 player slots on load
    const container = document.getElementById('playerInputsContainer');
    for (let i = 1; i <= 10; i++) {
        container.innerHTML += `
            <div class="form-group">
                <input type="text" class="player-input" placeholder="Player ${i} ID">
            </div>
        `;
    }

    // Helper sleep function
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function logMessage(msg) {
        const logBox = document.getElementById('statusLog');
        logBox.innerText += "\n" + msg;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
        document.getElementById('statusLog').innerText = "Processing started...";
    }

    // Centralized API Requesting function with safe query param proxy routing
    async function requestApi(targetUrl, apiKey, maxRetries = 3, baseDelay = 2500) {
        let currentDelay = baseDelay;
        
        // Securely passes target URL via query parameter (?url=...) to bypass CORS safely
        const proxiedUrl = `${PROXY_BASE_URL}/?url=${encodeURIComponent(targetUrl)}`;
        
        for (let attempt = 0; attempt < maxRetries; attempt++) {
            try {
                const response = await fetch(proxiedUrl, {
                    method: 'GET',
                    headers: {
                        'api-key': apiKey,
                        'Accept': 'application/json'
                    }
                });

                // Handle temporary overloads or rate limits
                if ([429, 502, 503, 504].includes(response.status)) {
                    logMessage(`      ⚠️ Server returned HTTP ${response.status}. Retrying in ${(currentDelay/1000).toFixed(2)}s... (Attempt ${attempt + 1}/${maxRetries})`);
                    await sleep(currentDelay);
                    currentDelay = (currentDelay * 2) + (Math.random() * 1000 + 500); // Exponential Backoff + Jitter
                    continue;
                }

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                if (attempt < maxRetries - 1) {
                    logMessage(`      ⚠️ Network issue. Retrying in ${(currentDelay/1000).toFixed(2)}s... (Attempt ${attempt + 1}/${maxRetries})`);
                    await sleep(currentDelay);
                    currentDelay = (currentDelay * 2) + (Math.random() * 1000 + 500);
                } else {
                    throw error;
                }
            }
        }
        throw new Error(`API failed persistently after ${maxRetries} attempts.`);
    }

    // Fetch and display usage limit and total calls
    async function updateUsageStats(apiKey) {
        const usageUrl = `https://api.r6data.com/api/me/usage`;
        try {
            const resJson = await requestApi(usageUrl, apiKey);
            
            // Safe robust key path check to accommodate varying payload layouts
            const limit = resJson?.limit ?? resJson?.data?.limit;
            const totalCalls = resJson?.usage?.total_calls ?? resJson?.data?.usage?.total_calls ?? resJson?.total_calls;

            if (limit !== undefined && totalCalls !== undefined) {
                document.getElementById('usageCalls').innerText = totalCalls.toLocaleString();
                document.getElementById('usageLimit').innerText = limit.toLocaleString();
                document.getElementById('usageContainer').style.display = "block";
            }
        } catch (e) {
            console.error("Failed to update R6Data API usage information:", e);
        }
    }

    // Fallback parser handling full stats data mapping
    async function fetchLifetimeMaxRp(username, apiKey) {
        const targetUrl = `https://api.r6data.com/api/stats?type=fullStats&nameOnPlatform=${username}&platformType=uplay&modes=ranked`;        
        try {
            const resJson = await requestApi(targetUrl, apiKey);
            const segments = resJson?.data?.segments;
            
            let maxPoints = 0;
            
            // Loop through seasonal chunks to find absolute historical max point values
            if (Array.isArray(segments)) {
                for (let segment of segments) {
                    let rpVal = segment?.stats?.maxRankPoints?.value ?? segment?.stats?.maxRankPoint?.value;
                    if (rpVal) {
                        maxPoints = Math.max(maxPoints, parseInt(rpVal));
                    }
                }
            } else if (segments && typeof segments === 'object') {
                let rpVal = segments?.stats?.maxRankPoints?.value ?? segments?.stats?.maxRankPoint?.value;
                if (rpVal) maxPoints = parseInt(rpVal);
            }

            return maxPoints > 0 ? maxPoints : null;
        } catch (e) {
            logMessage(`   ⚠️ [${username}] Fallback API lookup failed.`);
            return null;
        }
    }

    // Primary parser managing seasonal lookups
    async function fetchPlayerRp(username, apiKey) {
        const targetUrl = `https://api.r6data.com/api/stats?type=seasonalStats&nameOnPlatform=${username}&platformType=uplay&modes=ranked`;
        try {
            const resJson = await requestApi(targetUrl, apiKey);
            const historyData = resJson?.data?.history?.data;

            // Scenario A: Seasonal profile data array exists
            if (Array.isArray(historyData) && historyData.length > 0) {
                const firstRecord = historyData[0];
                if (Array.isArray(firstRecord) && firstRecord.length > 1) {
                    const rpValue = firstRecord[1]?.value;
                    if (rpValue !== undefined && rpValue !== null) {
                        logMessage(`   -> ${username}: ${parseInt(rpValue).toLocaleString()} RP (Current Season)`);
                        return parseInt(rpValue);
                    }
                }
            }

            // Scenario B: Active current data is absent, trigger lifetime lookups
            logMessage(`   ℹ️ [${username}] No seasonal data. Fetching lifetime max rank...`);
            await sleep(BASE_DELAY);
            const lifetimeRp = await fetchLifetimeMaxRp(username, apiKey);
            if (lifetimeRp !== null) {
                logMessage(`   -> ${username}: ${lifetimeRp.toLocaleString()} RP (Lifetime Max Fallback)`);
                return lifetimeRp;
            }

            logMessage(`   ⚠️ [${username}] Missing history. Assigning baseline ${DEFAULT_RP} RP.`);
            return DEFAULT_RP;

        } catch (e) {
            logMessage(`   ❌ [${username}] Primary search failed. Trying fallback data routing...`);
            await sleep(BASE_DELAY);
            const lifetimeRp = await fetchLifetimeMaxRp(username, apiKey);
            if (lifetimeRp !== null) {
                logMessage(`   -> ${username}: ${lifetimeRp.toLocaleString()} RP (Lifetime Max Fallback)`);
                return lifetimeRp;
            }
            logMessage(`   ⚠️ [${username}] Verification failed. Assigning baseline ${DEFAULT_RP} RP.`);
            return DEFAULT_RP;
        }
    }

    // Control framework coordinating input collection, mapping execution, and display operations
    async function processAndBalance() {
        const rawBase64 = document.getElementById('base64Key').value.trim();
        if (!rawBase64) {
            alert("Please provide a Base64 encoded API Key first!");
            return;
        }

        let decodedKey = "";
        try {
            decodedKey = atob(rawBase64);
        } catch (e) {
            alert("Failed to decode API key. Please make sure you are inputting a valid Base64 string.");
            return;
        }

        // Instantly trigger an API usage limits check
        updateUsageStats(decodedKey);

        const inputElements = document.querySelectorAll('.player-input');
        let lobbyIds = [];
        inputElements.forEach(el => {
            const val = el.value.trim();
            if (val) lobbyIds.push(val);
        });

        if (lobbyIds.length < 2) {
            alert("Minimum 2 players must be entered to arrange teams! Single entries are blocked.");
            return;
        }

        clearLog();
        document.getElementById('balanceBtn').disabled = true;

        let playersData = [];

        for (let name of lobbyIds) {
            const rp = await fetchPlayerRp(name, decodedKey);
            playersData.push({ name, rp });
            await sleep(BASE_DELAY);
        }

        playersData.sort((a, b) => b.rp - a.rp);

        let blueTeam = [];
        let orangeTeam = [];
        let blueTotal = 0;
        let orangeTotal = 0;

        for (let player of playersData) {
            if (blueTotal <= orangeTotal && blueTeam.length < Math.floor(playersData.length / 2)) {
                blueTeam.push(player);
                blueTotal += player.rp;
            } else if (orangeTeam.length < Math.ceil(playersData.length / 2)) {
                orangeTeam.push(player);
                orangeTotal += player.rp;
            } else {
                blueTeam.push(player);
                blueTotal += player.rp;
            }
        }

        // Output Team Blue with blue-colored markers
        document.getElementById('blueTeamList').innerHTML = blueTeam.map((p, idx) => `
            <li>
                <span class="player-name-wrapper">
                    <span class="num-blue">${idx + 1}.</span>
                    <span>${p.name}</span>
                </span>
                <span>${p.rp.toLocaleString()} RP</span>
            </li>
        `).join('');
        
        // Output Team Orange with orange-colored markers
        document.getElementById('orangeTeamList').innerHTML = orangeTeam.map((p, idx) => `
            <li>
                <span class="player-name-wrapper">
                    <span class="num-orange">${idx + 1}.</span>
                    <span>${p.name}</span>
                </span>
                <span>${p.rp.toLocaleString()} RP</span>
            </li>
        `).join('');

        document.getElementById('blueTotal').innerText = `Total RP: ${blueTotal.toLocaleString()}`;
        document.getElementById('orangeTotal').innerText = `Total RP: ${orangeTotal.toLocaleString()}`;

        const diff = Math.abs(blueTotal - orangeTotal);
        document.getElementById('finalDiff').innerText = `⚖️ Skill Variance: ${diff.toLocaleString()} RP Difference`;

        document.getElementById('blueTeamBox').style.display = "block";
        document.getElementById('orangeTeamBox').style.display = "block";
        document.getElementById('finalDiff').style.display = "block";

        logMessage("✅ Team configuration calculated successfully!");
        document.getElementById('balanceBtn').disabled = false;

        // Fetch updated stats once more to show consumption of completed run
        updateUsageStats(decodedKey);
    }
</script>

</body>
</html>
